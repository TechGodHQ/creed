schema: spec-driven

context: |
  Tech stack: Go 1.23, Cobra CLI, standard library first
  Module path: github.com/techgodhq/creed
  Architecture: ports & adapters (hexagonal) — domain logic has zero external deps
  Coding style: idiomatic Go, gofmt, golangci-lint, table-driven tests
  Commit convention: conventional commits (feat:, fix:, refactor:, docs:, chore:)
  
  What creed does: Syncs AI context (skills, specs, config) across multiple tools.
  One source of truth, emitted as AGENTS.md, CLAUDE.md, .cursor/rules/, etc.
  Each tool has a "target" with its own emit paths and formatting conventions.
  
  Design principles:
    - Single source, many outputs (prism metaphor)
    - Provider-aware: handle hostile tools that lock down directory structures
    - Declarative config (creed.yaml) describes what to emit and where
    - Idempotent: running sync twice produces the same result
    - Extensible: adding a new target should be trivial

rules:
  proposal:
    - Keep proposals under 500 words
    - Always include a "Non-goals" section
    - Reference specific target tools (claude, cursor, codex, etc.)
  design:
    - Include ASCII architecture diagrams
    - Document every interface/port before implementation
    - Justify each external dependency
  tasks:
    - Break tasks into chunks of max 2 hours
    - Each task must be independently testable
    - Order tasks by dependency (ports → adapters → use cases → CLI wiring)
